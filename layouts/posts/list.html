{{ define "main" }}
  <section class="page-heading">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p>{{ . }}</p>{{ end }}
  </section>
  <div class="post-list">
    {{ range .Paginator.Pages }}
      {{ partial "post-card.html" . }}
    {{ end }}
  </div>
  {{ template "_internal/pagination.html" . }}
{{ end }}
